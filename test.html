<!DOCTYPE html>
<html>
<head>
    <title>Voice Test</title>
</head>
<body>
    <h1>Voice Recognition Test</h1>
    <button onclick="startVoice()">START VOICE</button>
    <div id="output"></div>

    <script>
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            alert("Your browser does not support voice recognition. Use Chrome.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';

        recognition.onstart = function() {
            document.getElementById('output').innerHTML = '🎤 Listening... Speak now';
        };

        recognition.onresult = function(event) {
            const text = event.results[0][0].transcript;
            document.getElementById('output').innerHTML = '✅ You said: ' + text;
        };

        recognition.onerror = function(event) {
            document.getElementById('output').innerHTML = '❌ Error: ' + event.error;
        };

        recognition.start();
    }
    </script>
</body>
</html>
